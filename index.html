<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desk Cleaner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a0f0a;color:#fff5f0;font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;padding:20px 28px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #3d2418;}
.logo{width:38px;height:38px;background:linear-gradient(135deg,#ff6b4a,#ffb347);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-title{font-family:monospace;font-size:14px;font-weight:700;color:#ff9472;letter-spacing:.06em;}
.logo-sub{font-size:11px;color:#a07060;font-family:monospace;}
main{width:100%;max-width:820px;padding:44px 20px;flex:1;}
h1{font-size:clamp(24px,5vw,44px);font-weight:900;line-height:1.1;margin-bottom:14px;text-align:center;}
h1 span{color:#ff6b4a;}
.sub{color:#a07060;font-size:15px;margin-bottom:12px;line-height:1.8;text-align:center;}
.tags{display:flex;gap:8px;margin-bottom:36px;flex-wrap:wrap;justify-content:center;}
.tag{font-size:12px;padding:4px 12px;border-radius:20px;background:rgba(255,107,74,.12);color:#ff9472;border:1px solid #3d2418;}
.dropzone{border:2px dashed #3d2418;border-radius:20px;padding:56px 32px;cursor:pointer;background:#241510;transition:all .2s;text-align:center;position:relative;}
.dropzone:hover,.dropzone.drag{border-color:#ff6b4a;background:#2a1208;}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:48px;margin-bottom:14px;}
.drop-title{font-size:17px;font-weight:700;margin-bottom:8px;}
.drop-desc{color:#a07060;font-size:13px;}
#preview-img{width:100%;max-height:300px;object-fit:contain;border-radius:12px;display:none;}
.btn{margin-top:22px;padding:15px 52px;background:linear-gradient(135deg,#ff6b4a,#ffb347);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;box-shadow:0 4px 20px rgba(255,107,74,.35);display:none;transition:all .2s;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.btn-reset{display:block;width:100%;padding:14px;background:transparent;border:1px solid #3d2418;border-radius:12px;color:#a07060;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;margin-top:0;}
.btn-reset:hover{border-color:#fff5f0;color:#fff5f0;}
#loading{display:none;text-align:center;padding:80px 0;}
.spinner{width:60px;height:60px;border:3px solid #3d2418;border-top-color:#ff6b4a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 24px;}
.loading-txt{color:#a07060;font-family:monospace;font-size:14px;animation:pulse 1.5s ease-in-out infinite;}
#result{display:none;animation:fadeUp .5s ease;}
.score-card{background:#241510;border:1px solid #3d2418;border-radius:20px;padding:32px 36px;margin-bottom:24px;display:flex;align-items:center;gap:36px;flex-wrap:wrap;}
.ring-wrap{position:relative;width:140px;height:140px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-val{font-size:36px;font-weight:700;font-family:monospace;line-height:1;color:#ff6b4a;}
.score-denom{font-size:12px;color:#a07060;margin-top:2px;}
.grade-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;font-family:monospace;margin-bottom:10px;}
.score-title{font-size:20px;font-weight:700;margin-bottom:8px;}
.score-comment{color:#a07060;font-size:14px;line-height:1.7;margin-bottom:16px;}
.debug-row{display:flex;gap:8px;flex-wrap:wrap;}
.debug-item{background:#2e1c13;border-radius:8px;padding:6px 12px;font-size:12px;}
.debug-label{color:#a07060;}
.debug-val{color:#fff5f0;font-family:monospace;}
.section-title{font-size:12px;font-weight:700;color:#a07060;font-family:monospace;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;}
.imps{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.imp{border:1px solid #3d2418;border-radius:14px;padding:16px 20px;display:flex;align-items:flex-start;gap:14px;}
.imp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.imp-pri{font-size:10px;font-family:monospace;font-weight:700;margin-bottom:3px;letter-spacing:.08em;}
.imp-title{font-weight:700;font-size:14px;margin-bottom:4px;color:#fff5f0;}
.imp-desc{color:#a07060;font-size:13px;line-height:1.6;}
.imp.high{background:rgba(255,107,74,.1);}.imp.high .imp-icon{background:rgba(255,107,74,.2);}.imp.high .imp-pri{color:#ff6b4a;}
.imp.med{background:rgba(255,179,71,.08);}.imp.med .imp-icon{background:rgba(255,179,71,.18);}.imp.med .imp-pri{color:#ffb347;}
.imp.low{background:rgba(255,148,114,.08);}.imp.low .imp-icon{background:rgba(255,148,114,.16);}.imp.low .imp-pri{color:#ff9472;}
.todo-box{background:#241510;border:1px solid #3d2418;border-radius:20px;padding:24px;margin-bottom:24px;}
.todo-list{list-style:none;display:flex;flex-direction:column;gap:10px;}
.todo-item{display:flex;align-items:center;gap:14px;padding:13px 16px;background:#2e1c13;border-radius:12px;cursor:pointer;transition:opacity .2s;}
.todo-item.done{opacity:.4;}
.todo-check{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid #3d2418;background:transparent;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;transition:all .2s;}
.todo-item.done .todo-check{background:#ff6b4a;border-color:#ff6b4a;}
.todo-text{flex:1;font-size:14px;color:#fff5f0;}
.todo-item.done .todo-text{text-decoration:line-through;color:#a07060;}
.todo-tag{font-size:11px;font-family:monospace;font-weight:700;padding:3px 8px;border-radius:6px;}
.tag-high{background:rgba(255,107,74,.22);color:#ff6b4a;}
.tag-med{background:rgba(255,179,71,.22);color:#ffb347;}
.tag-low{background:rgba(255,148,114,.18);color:#ff9472;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
@media(max-width:560px){.score-card{flex-direction:column;align-items:center;text-align:center;}.debug-row{justify-content:center;}}
</style>
</head>
<body>
<header>
  <div class="logo">🧹</div>
  <div>
    <div class="logo-title">DESK CLEANER</div>
    <div class="logo-sub">画像解析で机を採点</div>
  </div>
</header>
<main>
  <div id="upload-section">
    <h1>机の写真を<br><span>画像解析</span>で採点</h1>
    <p class="sub">明るさ・色の多様性・エッジ量を<br>数値化して100点満点で採点します。</p>
    <div class="tags">
      <span class="tag">💡 明るさ分析</span>
      <span class="tag">🎨 色多様性</span>
      <span class="tag">📐 エッジ密度</span>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept="image/*" id="file-input">
      <div id="drop-content">
        <div class="drop-icon">📸</div>
        <div class="drop-title">写真をドロップ、またはタップして選択</div>
        <div class="drop-desc">JPG / PNG 対応</div>
      </div>
      <img id="preview-img" alt="preview">
    </div>
    <button class="btn" id="analyze-btn" onclick="analyze()">🔍 机を解析する</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-txt" id="loading-txt">解析中...</div>
  </div>

  <div id="result">
    <div class="score-card">
      <div class="ring-wrap">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="54" fill="none" stroke="#3d2418" stroke-width="10"/>
          <circle id="ring-circle" cx="70" cy="70" r="54" fill="none" stroke="#ff6b4a" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="339.3" stroke-dashoffset="339.3"
            style="transition:stroke-dashoffset 1s ease,stroke .3s"/>
        </svg>
        <div class="ring-num">
          <span class="score-val" id="score-val">0</span>
          <span class="score-denom">/ 100</span>
        </div>
      </div>
      <div style="flex:1">
        <div class="grade-badge" id="grade-badge">Grade S</div>
        <div class="score-title" id="score-title"></div>
        <div class="score-comment" id="score-comment"></div>
        <div class="debug-row" id="debug-row"></div>
      </div>
    </div>

    <div class="section-title">改善ポイント</div>
    <div class="imps" id="imps"></div>

    <div class="todo-box">
      <div class="section-title">📋 Todoリスト</div>
      <ul class="todo-list" id="todo-list"></ul>
    </div>

    <button class="btn-reset" onclick="reset()">↩ 別の写真で試す</button>
  </div>
</main>

<canvas id="canvas" style="display:none"></canvas>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const previewImg = document.getElementById('preview-img');
const dropContent = document.getElementById('drop-content');
const analyzeBtn = document.getElementById('analyze-btn');
let imgLoaded = false;

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if(fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    previewImg.src = e.target.result;
    previewImg.style.display = 'block';
    dropContent.style.display = 'none';
    previewImg.onload = () => { imgLoaded = true; };
    analyzeBtn.style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}

const msgs = ['画像を読み込み中...','明るさを分析中...','色の多様性を確認中...','エッジ密度を計算中...','スコアを算出中...'];

function analyze() {
  if (!imgLoaded) return;
  analyzeBtn.disabled = true;
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  let i = 0;
  const iv = setInterval(() => { document.getElementById('loading-txt').textContent = msgs[++i % msgs.length]; }, 600);
  setTimeout(() => {
    clearInterval(iv);
    const result = analyzeImage(previewImg);
    document.getElementById('loading').style.display = 'none';
    renderResult(result);
  }, 1200);
}

function analyzeImage(img) {
  const canvas = document.getElementById('canvas');
  const SIZE = 200;
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, SIZE, SIZE);
  const { data } = ctx.getImageData(0, 0, SIZE, SIZE);
  let rSum=0,gSum=0,bSum=0,bright=0,dark=0;
  const hues = new Set(), n = SIZE*SIZE;
  for (let i=0; i<data.length; i+=4) {
    const r=data[i],g=data[i+1],b=data[i+2];
    rSum+=r; gSum+=g; bSum+=b;
    const lum=0.299*r+0.587*g+0.114*b;
    if(lum>180)bright++; if(lum<60)dark++;
    const max=Math.max(r,g,b),min=Math.min(r,g,b);
    if(max-min>40){let h=0;if(max===r)h=((g-b)/(max-min)+6)%6;else if(max===g)h=(b-r)/(max-min)+2;else h=(r-g)/(max-min)+4;hues.add(Math.floor(h*32/6));}
  }
  const avgLum=(0.299*rSum+0.587*gSum+0.114*bSum)/n;
  const brightRatio=bright/n, darkRatio=dark/n, colorVariety=hues.size;
  let edgeSum=0;
  for(let y=1;y<SIZE-1;y++)for(let x=1;x<SIZE-1;x++){
    const l=px=>0.299*data[px]+0.587*data[px+1]+0.114*data[px+2];
    const gx=-l((y-1)*SIZE*4+(x-1)*4)+l((y-1)*SIZE*4+(x+1)*4)-2*l(y*SIZE*4+(x-1)*4)+2*l(y*SIZE*4+(x+1)*4)-l((y+1)*SIZE*4+(x-1)*4)+l((y+1)*SIZE*4+(x+1)*4);
    const gy=-l((y-1)*SIZE*4+(x-1)*4)-2*l((y-1)*SIZE*4+x*4)-l((y-1)*SIZE*4+(x+1)*4)+l((y+1)*SIZE*4+(x-1)*4)+2*l((y+1)*SIZE*4+x*4)+l((y+1)*SIZE*4+(x+1)*4);
    edgeSum+=Math.sqrt(gx*gx+gy*gy);
  }
  const edgeDensity=edgeSum/((SIZE-2)*(SIZE-2));
  const lumScore=avgLum>60&&avgLum<210?100-Math.abs(avgLum-140)*0.5:50;
  const score=Math.max(5,Math.min(100,Math.round(lumScore-Math.min(darkRatio*200,40)-(colorVariety>20?(colorVariety-20)*2:0)*0.5-(edgeDensity>30?Math.min((edgeDensity-30)*1.2,40):0))));
  const imps=[],todos=[];
  if(darkRatio>0.15){imps.push({p:'high',i:'💡',t:'照明が暗い',d:'デスクライトを追加して手元を明るくしましょう。作業効率が大幅に上がります。'});todos.push({t:'デスクライトを購入・設置する',p:'high'});}
  if(edgeDensity>40){imps.push({p:'high',i:'📦',t:'物が多すぎる',d:'机の上を1/3に減らし、引き出しや棚へ収納しましょう。'});todos.push({t:'机の上の不要なものを撤去する',p:'high'});todos.push({t:'使用頻度の低いものを収納ボックスへ',p:'high'});}
  if(colorVariety>18){imps.push({p:'med',i:'🎨',t:'色が散らかっている',d:'文房具や小物の色を2〜3色に統一しましょう。'});todos.push({t:'文房具を統一カラーに買い替える',p:'med'});}
  if(brightRatio<0.1){imps.push({p:'med',i:'🪟',t:'反射・映り込みがある',d:'モニターの角度を調整して光の反射を減らしましょう。'});todos.push({t:'モニターの角度・位置を調整する',p:'med'});}
  if(edgeDensity>25&&edgeDensity<=40){imps.push({p:'med',i:'🗂️',t:'書類・ケーブルが散乱気味',d:'ケーブルクリップとトレーで整理しましょう。'});todos.push({t:'ケーブルをクリップでまとめる',p:'med'});todos.push({t:'書類をトレーに分類する',p:'med'});}
  if(avgLum<80)todos.push({t:'カーテンを開けて自然光を取り入れる',p:'med'});
  imps.push({p:'low',i:'✨',t:'定期的な拭き掃除',d:'週1回の乾拭きで清潔感がぐっと上がります。'});
  todos.push({t:'机の表面を乾拭きする（週1習慣化）',p:'low'});
  todos.push({t:'5分タイマーでデスク周りを片付ける',p:'low'});
  const grade=score>=90?'S':score>=75?'A':score>=60?'B':score>=40?'C':'D';
  const titles={S:'完璧な机です！',A:'かなり整っています',B:'まあまあ整理されています',C:'少し散らかっています',D:'大幅な整理が必要です'};
  const comments={S:'非常に整理された素晴らしい机です。明るく清潔で、作業効率も最高でしょう。',A:'全体的によく整っています。細かい部分を整えるともっと快適になります。',B:'基本的な整理はできています。いくつかの改善でぐっと使いやすくなります。',C:'物や色が多く、散らかった印象です。優先度の高い項目から片付けましょう。',D:'かなり雑然としています。まず不要なものを撤去することから始めましょう。'};
  return {score,grade,title:titles[grade],comment:comments[grade],imps:imps.slice(0,5),todos:todos.slice(0,8),debug:{avgLum:Math.round(avgLum),colorVariety,edgeDensity:Math.round(edgeDensity),darkRatio:Math.round(darkRatio*100)}};
}

function renderResult(r) {
  const gc={S:'#ff6b4a',A:'#ff9472',B:'#ffb347',C:'#ffd166',D:'#e05555'};
  const color=gc[r.grade]||'#888';
  const circ=339.3, offset=circ-(circ*r.score/100);
  const circle=document.getElementById('ring-circle');
  const ringColor=r.score>=80?'#ff6b4a':r.score>=60?'#ff9472':r.score>=40?'#ffb347':'#e05555';
  circle.style.stroke=ringColor;
  setTimeout(()=>{ circle.style.strokeDashoffset=offset; },50);
  document.getElementById('score-val').textContent=r.score;
  document.getElementById('score-val').style.color=ringColor;
  const badge=document.getElementById('grade-badge');
  badge.textContent='Grade '+r.grade;
  badge.style.background=color+'22'; badge.style.color=color; badge.style.border='1px solid '+color+'44';
  document.getElementById('score-title').textContent=r.title;
  document.getElementById('score-comment').textContent=r.comment;
  document.getElementById('debug-row').innerHTML=[
    {l:'明るさ',v:r.debug.avgLum+'/255'},{l:'色数',v:r.debug.colorVariety+'/32'},
    {l:'エッジ',v:r.debug.edgeDensity},{l:'暗部率',v:r.debug.darkRatio+'%'}
  ].map(d=>`<div class="debug-item"><span class="debug-label">${d.l}：</span><span class="debug-val">${d.v}</span></div>`).join('');
  const plab={high:'優先度：高',med:'優先度：中',low:'優先度：低'};
  document.getElementById('imps').innerHTML=r.imps.map(imp=>`
    <div class="imp ${imp.p}">
      <div class="imp-icon">${imp.i}</div>
      <div><div class="imp-pri">${plab[imp.p]}</div><div class="imp-title">${imp.t}</div><div class="imp-desc">${imp.d}</div></div>
    </div>`).join('');
  const tlab={high:'急',med:'中',low:'後'};
  const tcls={high:'tag-high',med:'tag-med',low:'tag-low'};
  document.getElementById('todo-list').innerHTML=r.todos.map(todo=>`
    <li class="todo-item" onclick="toggleTodo(this)">
      <div class="todo-check"></div>
      <span class="todo-text">${todo.t}</span>
      <span class="todo-tag ${tcls[todo.p]}">${tlab[todo.p]}</span>
    </li>`).join('');
  document.getElementById('result').style.display='block';
}

function toggleTodo(el) {
  el.classList.toggle('done');
  el.querySelector('.todo-check').textContent=el.classList.contains('done')?'✓':'';
}

function reset() {
  document.getElementById('result').style.display='none';
  document.getElementById('upload-section').style.display='block';
  previewImg.style.display='none'; previewImg.src='';
  dropContent.style.display='block';
  analyzeBtn.style.display='none'; analyzeBtn.disabled=false;
  fileInput.value=''; imgLoaded=false;
  document.getElementById('ring-circle').style.strokeDashoffset='339.3';
}
</script>
</body>
</html>
